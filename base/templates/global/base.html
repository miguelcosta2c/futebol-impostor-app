{% load django_htmx %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  {% htmx_script %}
  {% tailwind_css %}
  {% block headers %}{% endblock %}
</head>
<body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
  {% block content %}{% endblock %}
</body>
</html>
